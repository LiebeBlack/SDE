<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestión Institucional - Software 100% Local</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .gradient-text {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            background-size: 200% 200%;
            animation: textGradient 3s ease infinite;
        }
        @keyframes textGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .card-hover {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .card-hover:hover {
            transform: translateY(-12px) scale(1.02);
            box-shadow: 0 25px 50px rgba(102, 126, 234, 0.25);
        }
        .fade-in {
            animation: fadeIn 1s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .pulse-glow {
            animation: pulseGlow 2s infinite;
        }
        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 20px rgba(102, 126, 234, 0.4); }
            50% { box-shadow: 0 0 40px rgba(102, 126, 234, 0.8); }
        }
        .float {
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        .slide-in-left {
            animation: slideInLeft 0.8s ease-out;
        }
        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-50px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .slide-in-right {
            animation: slideInRight 0.8s ease-out;
        }
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(50px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .scale-in {
            animation: scaleIn 0.6s ease-out;
        }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }
        .rotate-in {
            animation: rotateIn 0.8s ease-out;
        }
        @keyframes rotateIn {
            from { opacity: 0; transform: rotate(-10deg); }
            to { opacity: 1; transform: rotate(0deg); }
        }
        .bounce-in {
            animation: bounceIn 1s ease-out;
        }
        @keyframes bounceIn {
            0% { opacity: 0; transform: scale(0.3); }
            50% { transform: scale(1.05); }
            70% { transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }
        .shimmer {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            animation: particleFloat 10s infinite;
        }
        @keyframes particleFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-1000px) rotate(720deg); opacity: 0; }
        }
        .stagger-1 { animation-delay: 0.1s; }
        .stagger-2 { animation-delay: 0.2s; }
        .stagger-3 { animation-delay: 0.3s; }
        .stagger-4 { animation-delay: 0.4s; }
        .stagger-5 { animation-delay: 0.5s; }
        .stagger-6 { animation-delay: 0.6s; }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Navigation Component
        const Navbar = () => {
            const [scrolled, setScrolled] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <nav className={`fixed w-full z-50 transition-all duration-300 ${scrolled ? 'bg-white shadow-lg' : 'bg-transparent'}`}>
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="flex justify-between items-center h-16">
                            <div className="flex items-center space-x-2">
                                <span className="text-3xl">🏫</span>
                                <span className={`font-bold text-xl ${scrolled ? 'text-gray-900' : 'text-white'}`}>
                                    SGI Pro
                                </span>
                            </div>
                            <div className="hidden md:flex space-x-8">
                                <a href="features.html" className={`hover:text-purple-600 transition ${scrolled ? 'text-gray-700' : 'text-white'}`}>Características</a>
                                <a href="technology.html" className={`hover:text-purple-600 transition ${scrolled ? 'text-gray-700' : 'text-white'}`}>Tecnología</a>
                                <a href="faq.html" className={`hover:text-purple-600 transition ${scrolled ? 'text-gray-700' : 'text-white'}`}>FAQ</a>

                                    Descargar
                                </a>
                            </div>
                        </div>
                    </div>
                </nav>
            );
        };

        // Hero Section
        const Hero = () => (
            <section className="gradient-bg min-h-screen flex items-center justify-center relative overflow-hidden">
                <div className="absolute inset-0 opacity-10">
                    <div className="absolute top-20 left-20 w-72 h-72 bg-white rounded-full blur-3xl float"></div>
                    <div className="absolute bottom-20 right-20 w-96 h-96 bg-purple-300 rounded-full blur-3xl float stagger-2"></div>
                </div>
                {[...Array(20)].map((_, i) => (
                    <div 
                        key={i}

                        style={{
                            left: `${Math.random() * 100}%`,
                            top: `${Math.random() * 100}%`,

                        <div className="float stagger-2">

                    </svg>

        );

        // Features Section

            const features = [

                    title: "Gestión de Estudiantes",
                    description: "Registro completo con matrículas, estados académicos, información personal y seguimiento de progreso."

                            <p className="text-xl text-gray-600 max-w-2xl mx-auto slide-in-right">

                            </p>
                        </div>
                        <div className="grid md:grid-cols-2 lg:grid-cols-4 gap-8">
                            {tech.map((item, index) => (
                                <div key={index} className={`text-center card-hover bg-white rounded-2xl p-8 shadow-lg scale-in stagger-${(index % 4) + 1}`}>
                                    <div className="text-6xl mb-4 float">{item.icon}</div>
                                    <h3 className="text-xl font-bold text-gray-900 mb-2">{item.name}</h3>
                                    <p className="text-gray-600">{item.desc}</p>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        // Benefits Section
        const Benefits = () => {
            const benefits = [
                { title: "100% Privado", desc: "Tus datos nunca salen de tu computadora", icon: "🔒" },
                { title: "Sin Costos Recurrentes", desc: "Una sola compra, uso ilimitado", icon: "💰" },
                { title: "Función Offline", desc: "Trabaja sin conexión a internet", icon: "📡" },

                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="text-center mb-16">
                            <h2 className="text-4xl md:text-5xl font-bold text-gray-900 mb-4 bounce-in">
                                Beneficios <span className="gradient-text">Exclusivos</span>
                            </h2>
                            <p className="text-xl text-gray-600 max-w-2xl mx-auto slide-in-left">

                            </p>
                        </div>
                        <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                            {benefits.map((benefit, index) => (
                                <div key={index} className={`flex items-start space-x-4 bg-gradient-to-r from-purple-50 to-blue-50 rounded-xl p-6 card-hover scale-in stagger-${(index % 6) + 1}`}>

                                    <div>

                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        // Download Section
        const Download = () => (
            <section id="download" className="py-24 gradient-bg">
                <div className="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
                    <h2 className="text-4xl md:text-5xl font-bold text-white mb-6">

                    </h2>
                    <p className="text-xl text-white/90 mb-12">

                    <div className="bg-white rounded-2xl p-8 md:p-12 shadow-2xl">
                        <div className="grid md:grid-cols-2 gap-8 mb-8">
                            <div className="text-left">
                                <h3 className="text-2xl font-bold text-gray-900 mb-4">Versión Windows</h3>
                                <ul className="space-y-2 text-gray-600">

                                    <li>✓ Base de datos incluida</li>
                                    <li>✓ Sin dependencias externas</li>

                            </div>
                            <div className="text-left">
                                <h3 className="text-2xl font-bold text-gray-900 mb-4">Requisitos</h3>
                                <ul className="space-y-2 text-gray-600">
                                    <li>✓ Windows 10/11</li>
                                    <li>✓ 4GB RAM mínimo</li>
                                    <li>✓ 500MB espacio disco</li>
                                    <li>✓ Procesador de 64 bits</li>
                                </ul>
                            </div>
                        </div>
                        <button className="w-full gradient-bg text-white py-4 rounded-xl font-semibold text-lg hover:opacity-90 transition">

                        <p className="text-gray-500 mt-4 text-sm">

                        </p>
                    </div>
                </div>
            </section>
        );

        // Footer
        const Footer = () => (
            <footer className="bg-gray-900 text-white py-12">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                    <div className="grid md:grid-cols-4 gap-8 mb-8">
                        <div>
                            <div className="flex items-center space-x-2 mb-4">
                                <span className="text-3xl">🏫</span>
                                <span className="font-bold text-xl">SGI Pro</span>
                            </div>
                            <p className="text-gray-400">
                                Sistema de gestión institucional moderno, seguro y 100% local.
                            </p>
                        </div>
                        <div>
                            <h4 className="font-bold mb-4">Producto</h4>
                            <ul className="space-y-2 text-gray-400">
                                <li><a href="features.html" className="hover:text-white transition">Características</a></li>

        ReactDOM.render(<App />, document.getElementById('root'));

</body>
</html>
